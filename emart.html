<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이마트 필수 쟁여템 - Jay's Pick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="이마트 갈 때마다 무조건 쟁여두는 필수 리스트">
</head>
<body class="bg-gray-50 flex flex-col items-center min-h-screen px-4 py-8">
    <div class="max-w-md w-full">
        <!-- 상단 네비게이션 -->
        <div class="flex items-center mb-6">
            <a href="index.html" class="text-gray-500 hover:text-gray-800 transition p-2 rounded-full hover:bg-gray-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h1 class="text-xl font-bold text-gray-800 ml-2">🛒 이마트 필수 쟁여템</h1>
        </div>

        <!-- 쿠팡 파트너스 대가성 문구 -->
        <div class="text-center mb-6">
            <p class="text-xs text-gray-400 bg-gray-100 py-2 px-3 rounded-lg inline-block break-keep">
                * 이 페이지의 링크는 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받습니다.
            </p>
        </div>

        <!-- 아이템 리스트 컨테이너 -->
        <div id="item-list" class="space-y-5">
            <!-- 봇이 여기에 아이템을 추가합니다 -->
            <div class="text-center py-12 bg-white rounded-2xl border border-gray-100 shadow-sm empty-state">
                <p class="text-gray-500 font-medium">아직 등록된 아이템이 없습니다 😢</p>
                <p class="text-sm text-gray-400 mt-1">곧 핫한 아이템이 업데이트됩니다!</p>
            </div>
        </div>
        
    </div>
</body>
</html>
